<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحليل أداء المحققين - Professional Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: 'Tajawal', sans-serif; padding: 20px; }
        .investigator-card { background: #1e293b; border-radius: 24px; border: 1px solid #334155; transition: 0.3s; overflow: hidden; }
        .investigator-card:hover { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        .stat-badge { background: #0f172a; border: 1px solid #1e293b; border-radius: 16px; padding: 15px; text-align: center; }
        .closure-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
        .week-tag { font-size: 11px; background: #3b82f6; color: white; padding: 2px 8px; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

    <header class="max-w-7xl mx-auto mb-10 flex justify-between items-end">
        <div>
            <h1 class="text-4xl font-black text-white italic tracking-tighter uppercase">Team <span class="text-blue-500">Performance</span></h1>
            <p class="text-slate-500 font-bold text-xs mt-1 uppercase tracking-widest">Real-time Closure Analysis</p>
        </div>
        <div id="last-update" class="text-[10px] text-slate-500"></div>
    </header>

    <div id="grid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwZhr5GqkTH32_xaFgjjqpWmPQc2MHHcJqyg9J2U7_X5SKDcgmG21Q0rUlp6qS5zxjG/exec";

        async function init() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const report = {};

                // تحليل الداتا (اسم المحقق في I والحالة في J والأسبوع في B)
                data.forEach((row, index) => {
                    if (index === 0 || !row[8]) return; 

                    const name = row[8].trim();
                    const status = row[9] ? row[9].trim() : "Pending";
                    const week = row[1] ? "WK " + row[1] : "NA";

                    if (!report[name]) {
                        report[name] = { total: 0, done: 0, remain: 0, closures: {}, weekly: {} };
                    }

                    report[name].total++;
                    const isDone = status.toLowerCase().includes("done") || 
                                   status.toLowerCase().includes("defect") || 
                                   status.toLowerCase().includes("wis");

                    if (isDone) {
                        report[name].done++;
                        report[name].closures[status] = (report[name].closures[status] || 0) + 1;
                    } else {
                        report[name].remain++;
                    }

                    if (!report[name].weekly[week]) report[name].weekly[week] = { t:0, d:0 };
                    report[name].weekly[week].t++;
                    if (isDone) report[name].weekly[week].d++;
                });

                const grid = document.getElementById('grid');
                grid.innerHTML = "";

                Object.keys(report).sort().forEach(name => {
                    const user = report[name];
                    let closureLines = "";
                    Object.keys(user.closures).forEach(c => {
                        closureLines += `<div class="closure-row"><span>${c}</span><span class="font-bold text-blue-400">${user.closures[c]}</span></div>`;
                    });

                    let weeklyLines = "";
                    Object.keys(user.weekly).sort().forEach(w => {
                        weeklyLines += `
                            <div class="flex justify-between items-center bg-black/20 p-2 rounded-lg mb-1">
                                <span class="week-tag">${w}</span>
                                <span class="text-[11px]">المنجز: <b class="text-emerald-400">${user.weekly[w].d}</b> من ${user.weekly[w].t}</span>
                            </div>`;
                    });

                    grid.innerHTML += `
                        <div class="investigator-card p-6 flex flex-col">
                            <div class="mb-6 flex justify-between items-center">
                                <h2 class="text-2xl font-black text-white uppercase italic">${name}</h2>
                                <span class="text-blue-500 font-bold text-2xl">#${user.total}</span>
                            </div>

                            <div class="grid grid-cols-2 gap-3 mb-6 text-center">
                                <div class="stat-badge border-emerald-500/20">
                                    <span class="block text-[10px] text-emerald-500 font-bold uppercase mb-1">تم إنجازه</span>
                                    <span class="text-2xl font-black text-emerald-400">${user.done}</span>
                                </div>
                                <div class="stat-badge border-amber-500/20">
                                    <span class="block text-[10px] text-amber-500 font-bold uppercase mb-1">لسا معاه</span>
                                    <span class="text-2xl font-black text-amber-400">${user.remain}</span>
                                </div>
                            </div>

                            <div class="space-y-6">
                                <div>
                                    <p class="text-[10px] text-slate-500 font-bold mb-3 uppercase tracking-widest border-r-2 border-blue-500 pr-2">تحليل القفلة (Closure)</p>
                                    <div class="max-h-[120px] overflow-y-auto pr-2 custom-scroll">${closureLines || "لا يوجد بيانات مقفلة"}</div>
                                </div>
                                <div>
                                    <p class="text-[10px] text-slate-500 font-bold mb-3 uppercase tracking-widest border-r-2 border-emerald-500 pr-2">الأداء الأسبوعي</p>
                                    <div class="max-h-[120px] overflow-y-auto pr-2 custom-scroll">${weeklyLines}</div>
                                </div>
                            </div>

                            <div class="mt-auto pt-6 border-t border-white/5 text-center">
                                <div class="text-[10px] text-slate-500 font-bold mb-1 uppercase">Achievement Rate</div>
                                <div class="w-full bg-slate-700 h-1.5 rounded-full overflow-hidden">
                                    <div class="bg-blue-500 h-full" style="width: ${Math.round((user.done/user.total)*100)}%"></div>
                                </div>
                                <div class="text-xs font-black mt-2 text-blue-400">${Math.round((user.done/user.total)*100)}%</div>
                            </div>
                        </div>`;
                });
                document.getElementById('last-update').innerText = "Last Updated: " + new Date().toLocaleTimeString();

            } catch (e) {
                document.getElementById('grid').innerHTML = "<div class='text-red-500'>Error processing data. Check console.</div>";
            }
        }

        init();
        setInterval(init, 300000); // تحديث كل 5 دقائق
    </script>
</body>
</html>
