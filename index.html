<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operations Hub | Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .glass-card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .status-badge { padding: 4px 12px; border-radius: 99px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .bg-done { background: #dcfce7; color: #15803d; }
        .bg-wip { background: #fef9c3; color: #a16207; }
        .tab-btn { padding: 12px 24px; font-weight: 600; color: #64748b; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: #4f46e5; border-bottom-color: #4f46e5; background: white; border-radius: 12px 12px 0 0; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-7xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
        <div>
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Operations Intelligence</h1>
            <p class="text-slate-500">Real-time Ticket Tracking & Analysis</p>
        </div>
        <div id="syncStatus" class="px-4 py-2 rounded-full bg-white border font-bold text-xs shadow-sm uppercase tracking-widest text-slate-400">
            Connecting...
        </div>
    </header>

    <div class="max-w-7xl mx-auto mb-6 flex gap-2 border-b border-slate-200">
        <button onclick="switchTab('stats')" id="tab-stats" class="tab-btn active">Analytics View</button>
        <button onclick="switchTab('table')" id="tab-table" class="tab-btn">Data Explorer</button>
    </div>

    <main id="stats-section" class="max-w-7xl mx-auto space-y-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="glass-card p-6 border-l-4 border-indigo-500">
                <p class="text-xs font-bold text-slate-400 uppercase">Total Tickets</p>
                <h2 id="totalCount" class="text-4xl font-bold mt-2 text-slate-900">--</h2>
            </div>
            <div class="glass-card p-6 border-l-4 border-emerald-500">
                <p class="text-xs font-bold text-slate-400 uppercase">Reversal Rate</p>
                <h2 id="revRate" class="text-4xl font-bold mt-2 text-emerald-600">--</h2>
            </div>
            <div class="glass-card p-6 border-l-4 border-amber-500">
                <p class="text-xs font-bold text-slate-400 uppercase">Active WIP</p>
                <h2 id="wipCount" class="text-4xl font-bold mt-2 text-amber-600">--</h2>
            </div>
            <div class="glass-card p-6 border-l-4 border-rose-500">
                <p class="text-xs font-bold text-slate-400 uppercase">Defects</p>
                <h2 id="defects" class="text-4xl font-bold mt-2 text-rose-600">--</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="glass-card p-6 h-[400px]"><canvas id="chartInv"></canvas></div>
            <div class="glass-card p-6 h-[400px]"><canvas id="chartStatus"></canvas></div>
        </div>
    </main>

    <main id="table-section" class="max-w-7xl mx-auto hidden">
        <div class="glass-card overflow-hidden">
            <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                <input type="text" id="search" onkeyup="filter()" placeholder="Search ASIN or Investigator..." class="w-full max-w-md p-3 rounded-xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm text-sm">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm border-separate border-spacing-0">
                    <thead class="bg-slate-50 text-slate-500 font-bold uppercase text-[10px] tracking-wider">
                        <tr>
                            <th class="p-4 border-b">ASIN</th>
                            <th class="p-4 border-b">Investigator</th>
                            <th class="p-4 border-b">Status</th>
                            <th class="p-4 border-b">Reversed</th>
                            <th class="p-4 border-b">Action</th>
                        </tr>
                    </thead>
                    <tbody id="mainTable" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // الرابط الجديد اللي آخره DaY
        const API_URL = "https://script.google.com/macros/s/AKfycbzWevuSuWsZUIItdJzUPrIG3rtTkvStUSkG3nPgqv3ftZvl_0e675CIWXhrvzr4VDaY/exec";
        
        let allData = [];
        let charts = {};

        async function init() {
            const statusLabel = document.getElementById('syncStatus');
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (!data.html) {
                    statusLabel.innerText = "No Data Found";
                    return;
                }

                const parser = new DOMParser();
                const doc = parser.parseFromString(data.html, 'text/html');
                const rows = Array.from(doc.querySelectorAll('tr'));

                allData = [];
                rows.forEach(row => {
                    const rowText = row.innerText || "";
                    const cells = Array.from(row.querySelectorAll('td')).map(td => td.innerText.trim());
                    
                    // صائد الـ ASIN الذكي
                    const asinMatch = rowText.match(/B0[A-Z0-9]{8}/);
                    
                    if (asinMatch) {
                        const asin = asinMatch[0];
                        allData.push({
                            asin: asin,
                            inv: cells.find(c => ["Yousef", "Hayam", "Samy", "Mohamed"].some(name => c.includes(name))) || "N/A",
                            status: cells.find(c => ["Done", "WIP", "Pending", "Resolved"].some(s => c.toUpperCase().includes(s.toUpperCase()))) || "Pending",
                            rev: rowText.toLowerCase().includes('yes') || rowText.toLowerCase().includes('rev') ? 'Yes' : 'No',
                            link: row.querySelector('a') ? row.querySelector('a').href : "#"
                        });
                    }
                });

                if (allData.length > 0) {
                    updateDashboard();
                    statusLabel.innerText = `● LIVE: ${allData.length} RECORDS`;
                    statusLabel.className = "px-4 py-2 rounded-full bg-emerald-100 text-emerald-600 font-bold text-xs shadow-sm uppercase tracking-widest";
                } else {
                    statusLabel.innerText = "No ASINs Detected";
                }
            } catch (err) {
                statusLabel.innerText = "Sync Failed";
                console.error(err);
            }
        }

        function updateDashboard() {
            document.getElementById('totalCount').innerText = allData.length;
            const revCount = allData.filter(d => d.rev === 'Yes').length;
            document.getElementById('revRate').innerText = allData.length > 0 ? Math.round((revCount/allData.length)*100) + "%" : "0%";
            document.getElementById('wipCount').innerText = allData.filter(d => !d.status.toUpperCase().includes('DONE')).length;
            document.getElementById('defects').innerText = revCount;

            const tbody = document.getElementById('mainTable');
            tbody.innerHTML = allData.map(d => `
                <tr class="hover:bg-slate-50 transition border-b">
                    <td class="p-4 font-bold text-indigo-600">${d.asin}</td>
                    <td class="p-4 font-medium text-slate-700">${d.inv}</td>
                    <td class="p-4"><span class="status-badge ${d.status.toUpperCase().includes('DONE') ? 'bg-done' : 'bg-wip'}">${d.status}</span></td>
                    <td class="p-4 font-bold ${d.rev === 'Yes' ? 'text-emerald-600' : 'text-slate-300'}">${d.rev}</td>
                    <td class="p-4"><a href="${d.link}" target="_blank" class="text-indigo-500 hover:text-indigo-700 font-bold text-lg">↗</a></td>
                </tr>
            `).join('');

            renderCharts();
        }

        function renderCharts() {
            const invs = {}; 
            allData.forEach(d => { if(d.inv !== 'N/A') invs[d.inv] = (invs[d.inv] || 0) + 1 });
            
            if(charts.inv) charts.inv.destroy();
            const ctxInv = document.getElementById('chartInv').getContext('2d');
            charts.inv = new Chart(ctxInv, {
                type: 'bar',
                data: { 
                    labels: Object.keys(invs), 
                    datasets: [{ label: 'Workload', data: Object.values(invs), backgroundColor: '#6366f1', borderRadius: 8 }] 
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            const done = allData.filter(d => d.status.toUpperCase().includes('DONE')).length;
            const others = allData.length - done;
            
            if(charts.status) charts.status.destroy();
            const ctxStatus = document.getElementById('chartStatus').getContext('2d');
            charts.status = new Chart(ctxStatus, {
                type: 'doughnut',
                data: { 
                    labels: ['Done', 'WIP'], 
                    datasets: [{ data: [done, others], backgroundColor: ['#10b981', '#f59e0b'] }] 
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: '70%' }
            });
        }

        function switchTab(t) {
            document.getElementById('stats-section').classList.toggle('hidden', t !== 'stats');
            document.getElementById('table-section').classList.toggle('hidden', t !== 'table');
            document.getElementById('tab-stats').classList.toggle('active', t === 'stats');
            document.getElementById('tab-table').classList.toggle('active', t === 'table');
        }

        function filter() {
            const q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('#mainTable tr').forEach(r => {
                r.style.display = r.innerText.toLowerCase().includes(q) ? '' : 'none';
            });
        }

        init();
    </script>
</body>
</html>
