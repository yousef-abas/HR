<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investigator Hub | Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #020617; color: white; min-height: 100vh; }
        .card { 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 28px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover { 
            transform: translateY(-8px); 
            border-color: #3b82f6; 
            background: rgba(30, 41, 59, 0.7);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="max-w-7xl mx-auto mb-16 flex flex-col md:row justify-between items-center gap-6">
        <div class="text-center md:text-left">
            <h1 class="text-5xl font-black tracking-tighter">TEAM <span class="text-blue-500">DASHBOARD</span></h1>
            <p class="text-slate-500 font-bold mt-2 uppercase tracking-[0.3em] text-xs">Live Performance Metrics</p>
        </div>
        <div class="flex gap-4">
            <input type="text" id="searchInput" onkeyup="renderCards()" placeholder="Search Name..." 
                   class="bg-slate-900 border border-slate-800 rounded-2xl px-6 py-3 outline-none focus:ring-2 ring-blue-500 transition-all w-64">
            <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 px-8 py-3 rounded-2xl font-black transition-all shadow-lg shadow-blue-600/20">SYNC</button>
        </div>
    </header>

    <div id="grid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
        <div class="col-span-full text-center py-20 text-blue-400 font-bold animate-pulse">CONNECTING TO CLOUD...</div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyeeye2gUtED9-WdOoSULi--V3bp78sR-joP2Ff6FpWJM6rFlql_YQbSQFD0_2Ul2Rj/exec";
        let investigatorsData = {};

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // تجميع البيانات بناءً على أسماء الأعمدة في اللينك بتاعك
                data.forEach(item => {
                    const name = item.Investigator || "Unknown";
                    // لاحظ هنا بنستخدم Statues بالـ e زي ما هي في اللينك
                    const status = String(item.Statues || item.Status || "").toLowerCase();
                    
                    if (!investigatorsData[name]) {
                        investigatorsData[name] = { total: 0, done: 0, pending: 0 };
                    }
                    
                    investigatorsData[name].total++;
                    if (status.includes("done")) investigatorsData[name].done++;
                    else if (status.includes("pending")) investigatorsData[name].pending++;
                });

                renderCards();
            } catch (error) {
                document.getElementById('grid').innerHTML = `<p class="col-span-full text-center text-red-500 font-bold">Error: Cannot load data from Google Sheets.</p>`;
            }
        }

        function renderCards() {
            const grid = document.getElementById('grid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = "";

            Object.keys(investigatorsData).forEach(name => {
                if (name.toLowerCase().includes(search)) {
                    const stats = investigatorsData[name];
                    const completionRate = ((stats.done / stats.total) * 100).toFixed(0);

                    grid.innerHTML += `
                        <div class="card p-8 relative overflow-hidden group">
                            <div class="absolute top-0 right-0 p-6 opacity-10 text-6xl group-hover:opacity-20 transition-opacity">👤</div>
                            <div class="mb-8">
                                <h2 class="text-2xl font-black text-white mb-1 uppercase tracking-tight">${name}</h2>
                                <span class="bg-blue-500/10 text-blue-400 text-[10px] font-black px-3 py-1 rounded-full border border-blue-500/20">INVESTIGATOR</span>
                            </div>

                            <div class="grid grid-cols-3 gap-4 mb-8">
                                <div class="text-center">
                                    <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">Total</p>
                                    <p class="text-xl font-black">${stats.total}</p>
                                </div>
                                <div class="text-center">
                                    <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">Done</p>
                                    <p class="text-xl font-black text-emerald-400">${stats.done}</p>
                                </div>
                                <div class="text-center">
                                    <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">Pending</p>
                                    <p class="text-xl font-black text-amber-500">${stats.pending}</p>
                                </div>
                            </div>

                            <div class="pt-6 border-t border-white/5">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-xs font-bold text-slate-400">Completion Rate</span>
                                    <span class="text-xs font-bold text-emerald-400">${completionRate}%</span>
                                </div>
                                <div class="w-full h-2 bg-slate-800 rounded-full overflow-hidden">
                                    <div class="h-full bg-gradient-to-r from-blue-600 to-emerald-500 transition-all duration-1000" style="width: ${completionRate}%"></div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });
        }

        window.onload = fetchData;
    </script>
</body>
</html>
