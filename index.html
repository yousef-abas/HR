<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCR Operations Dashboard | Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .stat-card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-slate-700 pb-6">
            <div>
                <h1 class="text-2xl font-bold">CCR Live Hub</h1>
                <p class="text-slate-400 text-sm">Real-time Operations Tracking</p>
            </div>
            <div id="syncIndicator" class="bg-slate-800 px-4 py-2 rounded-lg text-xs font-bold flex items-center">
                <span class="status-dot bg-amber-500"></span> CONNECTING...
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="stat-card"><p class="text-xs text-slate-400 uppercase font-bold">Total ASINs</p><h2 id="totalCount" class="text-3xl font-bold mt-2">--</h2></div>
            <div class="stat-card border-b-4 border-emerald-500"><p class="text-xs text-slate-400 uppercase font-bold">Resolved</p><h2 id="doneCount" class="text-3xl font-bold mt-2 text-emerald-400">--</h2></div>
            <div class="stat-card border-b-4 border-amber-500"><p class="text-xs text-slate-400 uppercase font-bold">In Progress</p><h2 id="wipCount" class="text-3xl font-bold mt-2 text-amber-400">--</h2></div>
            <div class="stat-card border-b-4 border-rose-500"><p class="text-xs text-slate-400 uppercase font-bold">Reversals</p><h2 id="revCount" class="text-3xl font-bold mt-2 text-rose-400">--</h2></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="stat-card h-80"><canvas id="chartInv"></canvas></div>
            <div class="stat-card h-80"><canvas id="chartStatus"></canvas></div>
        </div>
    </div>

    <script>
        // البيانات اللي انت بعتها
        const TOKEN = "YkZTOU1BWEhrY1o=|1806663400|Bo/g9rIJjvQJxf+VGiX2lFDDKp+On2Ael3Im7SmMadc=";
        const THREAD_ID = "Sz1EAXnAToyk";
        
        // الوسيط اللي هيعدينا من حماية أمازون
        const PROXY_URL = "https://api.allorigins.win/get?url=";
        const TARGET_URL = encodeURIComponent(`https://quip-amazon.com/2/threads/${THREAD_ID}`);

        let charts = {};

        async function fetchData() {
            const indicator = document.getElementById('syncIndicator');
            try {
                const response = await fetch(`${PROXY_URL}${TARGET_URL}`, {
                    headers: { "Authorization": `Bearer ${TOKEN}` }
                });
                const wrapper = await response.json();
                
                // الوسيط بيرجع البيانات جوه contents كـ string
                const quipData = JSON.parse(wrapper.contents);
                
                if (quipData.thread && quipData.thread.text) {
                    processData(quipData.thread.text);
                    indicator.innerHTML = '<span class="status-dot bg-emerald-500"></span> LIVE SYNC ACTIVE';
                }
            } catch (err) {
                indicator.innerHTML = '<span class="status-dot bg-rose-500"></span> SYNC ERROR';
                console.error("Fetch Error:", err);
            }
        }

        function processData(text) {
            const lines = text.split('\n');
            const records = [];
            const names = ["Yousef", "Hayam", "Samy", "Mohamed"];

            lines.forEach(line => {
                const asin = line.match(/B0[A-Z0-9]{8}/i);
                if (asin) {
                    records.push({
                        inv: names.find(n => line.includes(n)) || "Other",
                        status: /Done|Resolved/i.test(line) ? "Done" : "WIP",
                        rev: /Yes|Rev/i.test(line)
                    });
                }
            });

            updateUI(records);
        }

        function updateUI(data) {
            const done = data.filter(d => d.status === "Done").length;
            document.getElementById('totalCount').innerText = data.length;
            document.getElementById('doneCount').innerText = done;
            document.getElementById('wipCount').innerText = data.length - done;
            document.getElementById('revCount').innerText = data.filter(d => d.rev).length;
            
            updateCharts(data);
        }

            function updateCharts(data) {
            const invCounts = {};
            data.forEach(d => invCounts[d.inv] = (invCounts[d.inv] || 0) + 1);

            if(charts.inv) charts.inv.destroy();
            charts.inv = new Chart(document.getElementById('chartInv'), {
                type: 'bar',
                data: {
                    labels: Object.keys(invCounts),
                    datasets: [{ label: 'Tickets', data: Object.values(invCounts), backgroundColor: '#6366f1' }]
                },
                options: { maintainAspectRatio: false, color: '#94a3b8' }
            });

            const done = data.filter(d => d.status === "Done").length;
            if(charts.status) charts.status.destroy();
            charts.status = new Chart(document.getElementById('chartStatus'), {
                type: 'doughnut',
                data: {
                    labels: ['Done', 'WIP'],
                    datasets: [{ data: [done, data.length - done], backgroundColor: ['#10b981', '#f59e0b'] }]
                },
                options: { maintainAspectRatio: false, cutout: '75%', color: '#94a3b8' }
            });
        }

        fetchData();
        setInterval(fetchData, 60000); // تحديث تلقائي كل دقيقة
    </script>
</body>
</html>
