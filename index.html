<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investigator Dashboard | WK_2:5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Tajawal', sans-serif; }
        .card-glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            transition: all 0.3s ease;
        }
        .card-glass:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.3); }
        .progress-bar { height: 8px; background: #1e293b; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); transition: width 1s ease; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-6xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-black mb-2 text-white italic uppercase tracking-tighter">
                Investigator <span class="text-blue-500">Dashboard</span>
            </h1>
            <div class="inline-block px-4 py-1 bg-blue-500/10 border border-blue-500/20 rounded-full">
                <p class="text-blue-400 font-bold text-xs tracking-widest uppercase">Week Tracking: WK_2:5</p>
            </div>
            <div id="loader" class="mt-10">
                <div class="inline-block w-8 h-8 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div>
            </div>
        </header>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        // رابط الـ API الشغال بتاعك
        const API_URL = "https://script.google.com/macros/s/AKfycbzjYDFw4J2mcnX7bmmb3s22qN6TbgXlGp8sm8PQ0v_QbEhh0YpHMwb7CRax0Ok5j6t1/exec";

        async function init() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (!Array.isArray(data) || data.length === 0) {
                    document.getElementById('loader').innerHTML = "لا توجد بيانات متاحة حالياً";
                    return;
                }

                const stats = {};

                data.forEach((row, index) => {
                    // تخطي صف الهيدر (Creation WK, Investigator, etc.)
                    if (index < 2) return;

                    // العمود رقم 9 (إندكس 8) هو الاسم
                    // العمود رقم 10 (إندكس 9) هو الحالة (Statues)
                    const name = row[8] ? row[8].toString().trim() : "";
                    const status = row[9] ? row[9].toString().trim().toLowerCase() : "";

                    if (!name || name === "" || name.toLowerCase().includes("investigator")) return;

                    if (!stats[name]) {
                        stats[name] = { total: 0, done: 0, pending: 0 };
                    }

                    stats[name].total++;

                    // الحالات اللي بتتحسب Done
                    const isDone = status.includes("done") || 
                                   status.includes("defect") || 
                                   status.includes("wis") || 
                                   status.includes("no defect");

                    if (isDone) {
                        stats[name].done++;
                    } else {
                        stats[name].pending++;
                    }
                });

                render(stats);
                document.getElementById('loader').style.display = 'none';

            } catch (err) {
                console.error(err);
                document.getElementById('loader').innerHTML = `<p class="text-red-400 font-bold">❌ فشل تحميل البيانات</p>`;
            }
        }

        function render(stats) {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";

            // ترتيب الأسماء أبجدياً
            Object.keys(stats).sort().forEach(name => {
                const p = stats[name];
                const percent = Math.round((p.done / p.total) * 100) || 0;

                grid.innerHTML += `
                    <div class="card-glass p-6">
                        <h2 class="text-xl font-bold text-white mb-4 truncate italic">${name}</h2>
                        <div class="grid grid-cols-3 gap-2 mb-6">
                            <div class="text-center p-2 bg-white/5 rounded-xl">
                                <p class="text-[9px] text-slate-500 uppercase font-bold">Total</p>
                                <p class="text-lg font-black">${p.total}</p>
                            </div>
                            <div class="text-center p-2 bg-emerald-500/10 rounded-xl">
                                <p class="text-[9px] text-emerald-500 uppercase font-bold">Done</p>
                                <p class="text-lg font-black text-emerald-400">${p.done}</p>
                            </div>
                            <div class="text-center p-2 bg-amber-500/10 rounded-xl">
                                <p class="text-[9px] text-amber-500 uppercase font-bold">Pending</p>
                                <p class="text-lg font-black text-amber-400">${p.pending}</p>
                            </div>
                        </div>
                        <div class="mt-4">
                            <div class="flex justify-between text-[10px] mb-1 font-bold">
                                <span class="text-slate-400 uppercase tracking-widest">Efficiency</span>
                                <span class="text-blue-400">${percent}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${percent}%"></div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        init();
    </script>
</body>
</html>
