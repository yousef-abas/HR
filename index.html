<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Debug Mode</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; p: 20px; }
        .error-box { color: red; border: 1px solid red; padding: 10px; margin-top: 20px; }
        .debug-box { color: #888; background: #111; padding: 10px; margin-top: 10px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>تحليل المشكلة (Debug Mode)</h1>
    <div id="status">جاري الاتصال بالـ API...</div>
    <div id="output"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwTnwnOyPfMy6lvpAErqTtM0lal2d3T-OhYRzkpobq3uc8aqB3dkaRyKqqCVxJr-Skd/exec";

        async function testFetch() {
            const status = document.getElementById('status');
            const output = document.getElementById('output');

            try {
                const response = await fetch(API_URL);
                
                // هنا هنشوف الـ Response راجع إيه بالظبط قبل ما نحوله لـ JSON
                const textData = await response.text();
                
                output.innerHTML += "<h3>المعلومات الخام المستلمة:</h3>";
                output.innerHTML += `<div class="debug-box">${textData.substring(0, 500)}</div>`;

                // محاولة تحويل النص لـ JSON
                try {
                    const jsonData = JSON.parse(textData);
                    if (Array.isArray(jsonData)) {
                        status.innerHTML = "✅ تم استلام مصفوفة بيانات بنجاح!";
                        status.style.color = "lime";
                    } else {
                        status.innerHTML = "⚠️ المستلم ليس مصفوفة (Array)!";
                    }
                } catch (e) {
                    status.innerHTML = "❌ فشل تحويل البيانات لـ JSON (البيانات ليست نص برمجي)";
                }

            } catch (err) {
                status.innerHTML = "❌ خطأ في الاتصال (CORS أو اللينك غلط)";
                output.innerHTML += `<div class="error-box">${err.message}</div>`;
            }
        }

        testFetch();
    </script>
</body>
</html>
