<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investigator Dashboard | WK_2:5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Tajawal', sans-serif; }
        .card-glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            transition: all 0.3s ease;
        }
        .card-glass:hover { transform: translateY(-5px); border-color: #3b82f6; }
        .progress-bar { height: 8px; background: #1e293b; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); transition: width 1s ease; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-6xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-black mb-2 text-white italic">INVESTIGATOR <span class="text-blue-500">PERFORMANCE</span></h1>
            <p class="text-slate-400 text-sm tracking-widest uppercase">Week Tracking: WK_2:5</p>
            <div id="loader" class="mt-10">
                <div class="inline-block w-8 h-8 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div>
            </div>
        </header>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        // رابط الـ API الجديد بتاعك
        const API_URL = "https://script.google.com/macros/s/AKfycbx0gCwKzLfXiUdYzC_kT9LAeSGugwgS4JsRvVdl4YgVk4g8Azj3wpj-Nwqjp1pbEUnP/exec";

        async function init() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                
                // الدخول لعمود البيانات
                const rows = result.data || result; 

                const stats = {};

                rows.forEach((row, index) => {
                    // تخطي أول صفين (الهيدر والأسماء)
                    if (index < 2) return;

                    // العمود I (رقم 8) هو Investigator
                    // العمود J (رقم 9) هو Statues
                    const name = row[8] ? row[8].toString().trim() : "";
                    const status = row[9] ? row[9].toString().trim().toLowerCase() : "";

                    if (!name || name === "" || name.toLowerCase() === "investigator") return;

                    if (!stats[name]) {
                        stats[name] = { total: 0, done: 0, pending: 0 };
                    }

                    stats[name].total++;

                    // منطق الحالات اللي بتتحسب Done
                    const isDone = status.includes("done") || 
                                   status.includes("defect") || 
                                   status.includes("wis") || 
                                   status.includes("no defect");

                    if (isDone) {
                        stats[name].done++;
                    } else {
                        stats[name].pending++;
                    }
                });

                render(stats);
                document.getElementById('loader').style.display = 'none';

            } catch (err) {
                console.error(err);
                document.getElementById('loader').innerHTML = `<p class="text-red-400">خطأ في تحميل البيانات</p>`;
            }
        }

        function render(stats) {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";

            Object.keys(stats).sort().forEach(name => {
                const p = stats[name];
                const percent = Math.round((p.done / p.total) * 100) || 0;

                grid.innerHTML += `
                    <div class="card-glass p-6">
                        <h2 class="text-xl font-bold text-white mb-4 truncate">${name}</h2>
                        <div class="flex justify-between mb-4">
                            <div class="text-center">
                                <p class="text-[10px] text-slate-500 uppercase">Total</p>
                                <p class="text-lg font-bold">${p.total}</p>
                            </div>
                            <div class="text-center">
                                <p class="text-[10px] text-emerald-500 uppercase">Done</p>
                                <p class="text-lg font-bold text-emerald-400">${p.done}</p>
                            </div>
                            <div class="text-center">
                                <p class="text-[10px] text-amber-500 uppercase">Pending</p>
                                <p class="text-lg font-bold text-amber-400">${p.pending}</p>
                            </div>
                        </div>
                        <div class="mt-4">
                            <div class="flex justify-between text-xs mb-1">
                                <span class="text-slate-400">Progress</span>
                                <span class="text-blue-400 font-bold">${percent}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${percent}%"></div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        init();
    </script>
</body>
</html>
