<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diagnostic Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .error-box { background: rgba(220, 38, 38, 0.2); border: 1px solid #dc2626; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; border: 1px solid #334155; }
    </style>
</head>
<body class="p-8">

    <h1 class="text-3xl font-bold mb-6">System <span class="text-blue-500">Check</span></h1>
    
    <div id="status-panel" class="mb-8 p-4 bg-slate-800 rounded-xl border border-slate-700">
        <p id="step1" class="text-slate-500">○ Connecting to Google Cloud...</p>
        <p id="step2" class="text-slate-500">○ Checking Data Format...</p>
        <p id="step3" class="text-slate-500">○ Rendering Cards...</p>
    </div>

    <div id="error-display"></div>
    <div id="cardsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyZa1tTyHrAwl_eFWqx5kfI0or275ZAWF79w3FTTcGWMrRBioXoBfPOaLSuMYxsMaWB/exec";

        async function startAnalysis() {
            const s1 = document.getElementById('step1');
            const s2 = document.getElementById('step2');
            const s3 = document.getElementById('step3');
            const errDiv = document.getElementById('error-display');

            try {
                // الخطوة 1: محاولة جلب البيانات
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Google Link is Private or Offline");
                
                s1.innerText = "● Connected to Google Cloud! (OK)";
                s1.classList.add('text-green-500');

                const data = await response.json();
                console.log("Raw Data:", data);

                // الخطوة 2: فحص شكل البيانات
                if (!Array.isArray(data) || data.length === 0) {
                    throw new Error("Connected, but Sheet is EMPTY or format is wrong.");
                }

                s2.innerText = `● Data Found: ${data.length} rows detected! (OK)`;
                s2.classList.add('text-green-500');

                // الخطوة 3: رسم الكروت
                const grid = document.getElementById('cardsGrid');
                const users = {};
                
                data.forEach(item => {
                    // تجربة كل الاحتمالات لاسم العمود
                    const name = item.Investigator || item.investigator || item.Name || "Unknown";
                    if (!users[name]) users[name] = 0;
                    users[name]++;
                });

                Object.keys(users).forEach(name => {
                    grid.innerHTML += `
                        <div class="card">
                            <h3 class="text-xl font-bold text-blue-400">${name}</h3>
                            <p class="text-slate-400 mt-2">Total Cases: ${users[name]}</p>
                        </div>
                    `;
                });

                s3.innerText = "● Dashboard Rendered Successfully!";
                s3.classList.add('text-green-500');

            } catch (error) {
                errDiv.innerHTML = `
                    <div class="error-box">
                        <h2 class="font-bold text-red-500">STOP! Critical Error Found:</h2>
                        <p class="mt-2 text-sm">${error.message}</p>
                        <p class="mt-4 text-xs text-slate-400 font-mono">Technical details: ${error.stack}</p>
                    </div>
                `;
            }
        }

        window.onload = startAnalysis;
    </script>
</body>
</html>
