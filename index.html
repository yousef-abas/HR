<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investigator Performance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #020617; color: white; min-height: 100vh; }
        .investigator-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .investigator-card:hover {
            transform: translateY(-10px);
            border-color: #3b82f6;
            background: rgba(30, 41, 59, 0.7);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="max-w-6xl mx-auto mb-16 flex flex-col md:flex-row justify-between items-center gap-6">
        <div>
            <h1 class="text-5xl font-black tracking-tighter">TEAM <span class="text-blue-500">SUMMARY</span></h1>
            <p class="text-slate-500 font-bold mt-2 uppercase tracking-[0.2em] text-xs">Total performance per investigator</p>
        </div>
        <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 px-10 py-3 rounded-2xl font-black transition-all">REFRESH</button>
    </header>

    <div id="grid" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
        <div class="col-span-full text-center py-20 text-slate-500 animate-pulse font-bold">LOADING INVESTIGATORS...</div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzRnXehVfjdj4has9QPqt5a6ifxXH_UO35w5hxzy8HS0UiuleCV0XYVyJlGLdS68CfV/exec";

        async function init() {
            const grid = document.getElementById('grid');
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // 1. تجميع البيانات لكل محقق (هنا السر)
                const investigators = {};
                
                data.forEach(item => {
                    const name = item.Investigator || "Unknown";
                    // تنظيف الاسم من المسافات
                    const cleanName = name.trim();
                    
                    if (!investigators[cleanName]) {
                        investigators[cleanName] = {
                            total: 0,
                            done: 0,
                            pending: 0,
                            weeks: new Set()
                        };
                    }
                    
                    investigators[cleanName].total++;
                    
                    const status = String(item.Statues || "").toLowerCase();
                    if (status.includes("done")) investigators[cleanName].done++;
                    else if (status.includes("pending")) investigators[cleanName].pending++;
                    
                    if (item.Week) investigators[cleanName].weeks.add(item.Week);
                });

                // 2. رسم كرت واحد لكل اسم
                grid.innerHTML = "";
                Object.keys(investigators).forEach(name => {
                    const stats = investigators[name];
                    const successRate = ((stats.done / stats.total) * 100).toFixed(0);

                    grid.innerHTML += `
                        <div class="investigator-card p-8 relative overflow-hidden group">
                            <div class="absolute -right-4 -bottom-4 text-8xl opacity-5 group-hover:opacity-10 transition-opacity">👤</div>
                            
                            <div class="mb-6">
                                <h2 class="text-3xl font-black text-white uppercase tracking-tight">${name}</h2>
                                <p class="text-blue-400 text-xs font-bold mt-1 tracking-widest uppercase">Investigator Profile</p>
                            </div>

                            <div class="grid grid-cols-2 gap-4 mb-8">
                                <div class="bg-slate-800/50 p-4 rounded-2xl">
                                    <span class="text-[10px] text-slate-500 block font-bold uppercase mb-1">Total Cases</span>
                                    <span class="text-2xl font-black">${stats.total}</span>
                                </div>
                                <div class="bg-emerald-500/10 p-4 rounded-2xl border border-emerald-500/20">
                                    <span class="text-[10px] text-emerald-500 block font-bold uppercase mb-1">Done</span>
                                    <span class="text-2xl font-black text-emerald-400">${stats.done}</span>
                                </div>
                            </div>

                            <div class="space-y-4 pt-6 border-t border-white/5">
                                <div class="flex justify-between items-center text-xs">
                                    <span class="text-slate-400 font-bold uppercase">Completion Score</span>
                                    <span class="text-emerald-400 font-black">${successRate}%</span>
                                </div>
                                <div class="w-full bg-slate-900 h-3 rounded-full overflow-hidden">
                                    <div class="h-full bg-gradient-to-r from-blue-600 to-emerald-400 transition-all duration-1000 shadow-[0_0_15px_rgba(59,130,246,0.5)]" 
                                         style="width: ${successRate}%"></div>
                                </div>
                                <p class="text-[10px] text-slate-500 italic">Active across ${stats.weeks.size} different weeks</p>
                            </div>
                        </div>
                    `;
                });

            } catch (error) {
                grid.innerHTML = `<p class="col-span-full text-center text-red-500">Error fetching data. Check your Google Script permissions.</p>`;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
