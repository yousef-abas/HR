<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quip Investigators | Team View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #020617; color: white; min-height: 100vh; }
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .glass-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: #3b82f6;
            background: rgba(30, 41, 59, 0.8);
        }
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 100; backdrop-filter: blur(5px); justify-content: center; align-items: center;
        }
        .modal.active { display: flex; }
    </style>
</head>
<body class="p-6">

    <header class="max-w-7xl mx-auto py-10 flex flex-col md:flex-row justify-between items-end gap-6">
        <div>
            <h1 class="text-5xl font-black tracking-tighter text-white">TEAM <span class="text-blue-500">INSIGHTS</span></h1>
            <p class="text-slate-500 mt-2 font-medium">Click on any investigator to view full performance logs.</p>
        </div>
        <input type="text" id="search" onkeyup="renderUI()" placeholder="Search investigator name..." 
               class="bg-slate-900 border border-slate-700 rounded-2xl px-6 py-4 w-full md:w-80 outline-none focus:ring-2 ring-blue-500 transition-all">
    </header>

    <div id="cardsGrid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>

    <div id="modal" class="modal p-4" onclick="closeModal(event)">
        <div class="bg-slate-900 w-full max-w-4xl max-h-[90vh] rounded-3xl overflow-hidden shadow-2xl flex flex-col" onclick="event.stopPropagation()">
            <div class="p-8 border-b border-white/5 flex justify-between items-center bg-slate-800/50">
                <div>
                    <h2 id="modalName" class="text-3xl font-bold">---</h2>
                    <p class="text-blue-400 text-sm font-bold uppercase tracking-widest mt-1">Full Investigation Logs</p>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white text-4xl">&times;</button>
            </div>
            <div id="modalContent" class="p-8 overflow-y-auto space-y-6">
                </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyfjiUQOnDUiTBnZpUxWRNnmCs-4OnzXhpuv6ePfgHSltMODXRJ9B5QyV71j7wJzSV8/exec";
        let rawData = [];

        async function init() {
            try {
                const response = await fetch(API_URL);
                rawData = await response.json();
                renderUI();
            } catch (e) { alert("Data Error! Check your script URL."); }
        }

        function renderUI() {
            const grid = document.getElementById('cardsGrid');
            const search = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = "";

            // تجميع البيانات
            const users = {};
            rawData.forEach(item => {
                const name = item.investigator || item.Investigator || "N/A";
                if (!users[name]) users[name] = { total: 0, items: [] };
                users[name].total++;
                users[name].items.push(item);
            });

            // رسم الكروت
            Object.keys(users).forEach(name => {
                if (name.toLowerCase().includes(search)) {
                    const data = users[name];
                    grid.innerHTML += `
                        <div class="glass-card p-8 rounded-[2rem] cursor-pointer relative overflow-hidden group" onclick="openModal('${name}')">
                            <div class="absolute -right-4 -top-4 w-24 h-24 bg-blue-500/10 rounded-full blur-2xl group-hover:bg-blue-500/20 transition-all"></div>
                            <div class="flex items-center gap-4 mb-6">
                                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-3xl shadow-lg shadow-blue-900/40">👤</div>
                                <div>
                                    <h3 class="text-xl font-bold text-white">${name}</h3>
                                    <span class="text-xs text-blue-400 font-bold uppercase tracking-tighter">Active Investigator</span>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-white/5 p-4 rounded-2xl">
                                    <span class="text-[10px] text-slate-500 block font-bold uppercase">Total Work</span>
                                    <span class="text-2xl font-black">${data.total}</span>
                                </div>
                                <div class="bg-blue-500/10 p-4 rounded-2xl flex items-center justify-center border border-blue-500/20">
                                    <span class="text-blue-400 font-bold text-sm tracking-tight">View Full Report &rarr;</span>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });
        }

        function openModal(name) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            document.getElementById('modalName').innerText = name;
            
            const userLogs = rawData.filter(d => (d.investigator || d.Investigator) === name);
            
            // تقسيم الشغل لأسابيع داخل الـ Modal
            const weeks = {};
            userLogs.forEach(log => {
                const w = log.week || log.Week || "Other";
                if (!weeks[w]) weeks[w] = [];
                weeks[w].push(log);
            });

            let html = "";
            Object.keys(weeks).sort().reverse().forEach(w => {
                html += `
                    <div class="space-y-3">
                        <div class="flex items-center gap-4">
                            <h4 class="text-blue-500 font-black text-lg">${w}</h4>
                            <div class="h-px bg-white/10 flex-1"></div>
                            <span class="bg-slate-800 px-3 py-1 rounded-full text-xs font-bold">${weeks[w].length} Cases</span>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            ${weeks[w].map(item => `
                                <div class="bg-white/5 border border-white/5 p-4 rounded-2xl flex justify-between items-center hover:bg-white/10 transition-all">
                                    <div>
                                        <p class="text-xs text-slate-400 font-mono">SIM ID: <span class="text-white">${item.sim || item.SIM || '---'}</span></p>
                                        <p class="text-[10px] text-blue-300 font-bold uppercase mt-1">${item.defectType || item.defect || 'Standard'}</p>
                                    </div>
                                    <span class="text-[10px] px-2 py-1 rounded bg-slate-700 text-slate-300 font-black">${(item.status || "DONE").toUpperCase()}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            content.innerHTML = html;
            modal.classList.add('active');
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        
        window.onclick = function(event) {
            if (event.target == document.getElementById('modal')) closeModal();
        }

        window.onload = init;
    </script>
</body>
</html>
