<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investigator Insights | Developed by Youssef Abbas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #020617; min-height: 100vh; color: #f8fafc; overflow-x: hidden; }
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; z-index: 1000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 0.8s ease;
        }
        .intro-ball { width: 100px; height: 100px; background: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 3rem; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); } 100% { transform: scale(1); } }
        .fade-out { opacity: 0 !important; pointer-events: none; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); }
        #main-content { opacity: 0; transition: opacity 1s ease; }
        .visible { opacity: 1 !important; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="intro-ball">🔍</div>
        <h1 class="text-white text-2xl font-bold mt-6">Investigator Performance</h1>
        <p id="loader-status" class="text-blue-400 mt-2 text-sm font-mono">Connecting to Cloud...</p>
    </div>

    <div id="main-content" class="p-6">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-white">Investigator Pro</h1>
                <p class="text-slate-400 text-sm">Real-time Performance Metrics</p>
            </div>
            <button onclick="window.location.reload()" class="bg-blue-600 px-6 py-2 rounded-xl font-bold">Refresh Data</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="card"><p class="text-xs text-slate-400 uppercase font-bold">Total Cases</p><p id="totalTickets" class="text-3xl font-bold text-white">0</p></div>
            <div class="card"><p class="text-xs text-slate-400 uppercase font-bold">Approved</p><p id="approvedCount" class="text-3xl font-bold text-emerald-400">0</p></div>
            <div class="card"><p class="text-xs text-slate-400 uppercase font-bold">Accuracy</p><p id="accuracy" class="text-3xl font-bold text-blue-400">0%</p></div>
            <div class="card"><p class="text-xs text-slate-400 uppercase font-bold">GSAB</p><p id="gsabCount" class="text-3xl font-bold text-amber-400">0</p></div>
        </div>

        <div class="card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-800 text-slate-300">
                        <tr>
                            <th class="p-4">Investigator</th>
                            <th class="p-4">SIM ID</th>
                            <th class="p-4">Defect</th>
                            <th class="p-4">Status</th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody" class="divide-y divide-slate-700"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwaf8WSbl7mfuf_rJng9z31dlzjitpca1COsitef2w8qptHrdvGFDCOkS_cLtr3VWi0/exec";

        async function fetchData() {
            const statusText = document.getElementById('loader-status');
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Network response was not ok");
                
                const data = await response.json();
                statusText.innerText = "Data Received! Processing...";
                
                renderData(data);
                showDashboard();
            } catch (error) {
                console.error("Fetch error:", error);
                statusText.innerText = "Error: Check URL permissions or Sheet headers.";
                // برضه هنفتح الداشبورد عشان ميفضلش معلق بس هتبقى فاضية
                setTimeout(showDashboard, 2000);
            }
        }

        function renderData(data) {
            const tbody = document.getElementById('logTableBody');
            const totalItems = data.length;
            let approved = 0;
            let gsab = 0;

            tbody.innerHTML = data.slice(0, 100).map(item => {
                // محاولة قراءة الأسماء بأي شكل (Case Sensitive check)
                const inv = item.investigator || item.Investigator || "N/A";
                const sim = item.sim || item.SIM || item["SIM ID"] || "---";
                const status = item.status || item.Status || "Done";
                const defect = item.defectType || item.defect || "N/A";

                if (status.toLowerCase().includes('approved')) approved++;
                if (defect.toLowerCase().includes('gsab')) gsab++;

                return `<tr>
                    <td class="p-4 font-bold text-white">${inv}</td>
                    <td class="p-4 text-blue-400 font-mono">${sim}</td>
                    <td class="p-4 text-slate-300">${defect}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded-lg text-xs font-bold ${status.toLowerCase().includes('approved') ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-700 text-slate-300'}">${status}</span></td>
                </tr>`;
            }).join('');

            document.getElementById('totalTickets').innerText = totalItems;
            document.getElementById('approvedCount').innerText = approved;
            document.getElementById('gsabCount').innerText = gsab;
            document.getElementById('accuracy').innerText = ((approved / totalItems) * 100 || 0).toFixed(1) + '%';
        }

        function showDashboard() {
            document.getElementById('intro-screen').classList.add('fade-out');
            document.getElementById('main-content').classList.add('visible');
        }

        window.onload = fetchData;
    </script>
</body>
</html>
