<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Performance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #020617; color: white; min-height: 100vh; }
        .investigator-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            transition: all 0.3s ease;
        }
        .investigator-card:hover {
            transform: translateY(-8px);
            border-color: #3b82f6;
            background: rgba(30, 41, 59, 0.7);
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="max-w-6xl mx-auto mb-16 flex flex-col md:flex-row justify-between items-center gap-6">
        <div>
            <h1 class="text-5xl font-black tracking-tighter italic">TEAM <span class="text-blue-500">STATS</span></h1>
            <p class="text-slate-500 font-bold mt-2 uppercase tracking-[0.2em] text-xs text-center md:text-left">Performance Summary</p>
        </div>
        <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 px-10 py-3 rounded-2xl font-black transition-all shadow-lg shadow-blue-600/20">REFRESH DATA</button>
    </header>

    <div id="grid" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div class="col-span-full text-center py-20 text-slate-500 animate-pulse font-bold">LOADING TEAM DATA...</div>
    </div>

    <script>
        // الرابط الجديد اللي انت بعته وشغال تمام
        const API_URL = "https://script.google.com/macros/s/AKfycbz4Ab-n1w8ygqA0upR-qJyd2WGFYXnqTs8PCIJ4mzvUt0NNgrj1lu-VXROB5E6cAxpc/exec";

        async function init() {
            const grid = document.getElementById('grid');
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // تجميع البيانات لكل محقق (Grouping)
                const summary = {};
                data.forEach(item => {
                    const name = item.Name;
                    if (!summary[name]) {
                        summary[name] = { total: 0, done: 0 };
                    }
                    summary[name].total++;
                    if (item.Status.toLowerCase().includes("done")) {
                        summary[name].done++;
                    }
                });

                // رسم الكروت في الصفحة
                grid.innerHTML = "";
                Object.keys(summary).sort().forEach(name => {
                    const stats = summary[name];
                    const percentage = ((stats.done / stats.total) * 100).toFixed(0);
                    
                    grid.innerHTML += `
                        <div class="investigator-card p-8 relative overflow-hidden group">
                            <div class="mb-6 flex justify-between items-start">
                                <div>
                                    <h2 class="text-2xl font-black uppercase tracking-tight">${name}</h2>
                                    <p class="text-blue-400 text-[10px] font-black uppercase tracking-widest mt-1">Investigator Profile</p>
                                </div>
                                <div class="bg-blue-600/20 text-blue-400 px-3 py-1 rounded-full text-[10px] font-black italic">ACTIVE</div>
                            </div>

                            <div class="grid grid-cols-2 gap-4 mb-8 text-center">
                                <div class="bg-slate-800/50 p-4 rounded-2xl border border-white/5">
                                    <span class="text-[10px] text-slate-500 block font-bold uppercase mb-1">Total Tasks</span>
                                    <span class="text-2xl font-black">${stats.total}</span>
                                </div>
                                <div class="bg-emerald-500/10 p-4 rounded-2xl border border-emerald-500/10">
                                    <span class="text-[10px] text-emerald-500 block font-bold uppercase mb-1">Done</span>
                                    <span class="text-2xl font-black text-emerald-400">${stats.done}</span>
                                </div>
                            </div>

                            <div class="space-y-2">
                                <div class="flex justify-between items-center text-[10px] font-black uppercase tracking-widest">
                                    <span class="text-slate-500">Progress</span>
                                    <span class="text-blue-400">${percentage}%</span>
                                </div>
                                <div class="w-full bg-slate-800 h-2.5 rounded-full overflow-hidden">
                                    <div class="bg-gradient-to-r from-blue-600 to-emerald-400 h-full rounded-full transition-all duration-1000" style="width: ${percentage}%"></div>
                                </div>
                            </div>
                        </div>
                    `;
                });

            } catch (error) {
                grid.innerHTML = `<p class="col-span-full text-center text-red-500 font-bold">Error: Connection failed. Check your API permissions.</p>`;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
