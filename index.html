<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCR Operations Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .stat-card { background: white; padding: 24px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight">CCR Live Dashboard</h1>
                <p class="text-slate-500">Real-time stats from Quip</p>
            </div>
            <div id="syncStatus" class="px-4 py-2 rounded-full bg-white border font-bold text-xs shadow-sm uppercase tracking-widest text-slate-400">
                Connecting...
            </div>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="stat-card border-l-4 border-indigo-500">
                <p class="text-xs font-bold text-slate-400 uppercase">Total Tickets</p>
                <h2 id="totalCount" class="text-4xl font-bold mt-2 text-slate-900">--</h2>
            </div>
            <div class="stat-card border-l-4 border-emerald-500">
                <p class="text-xs font-bold text-slate-400 uppercase">Resolved</p>
                <h2 id="doneCount" class="text-4xl font-bold mt-2 text-emerald-600">--</h2>
            </div>
            <div class="stat-card border-l-4 border-amber-500">
                <p class="text-xs font-bold text-slate-400 uppercase">WIP</p>
                <h2 id="wipCount" class="text-4xl font-bold mt-2 text-amber-600">--</h2>
            </div>
            <div class="stat-card border-l-4 border-rose-500">
                <p class="text-xs font-bold text-slate-400 uppercase">Reversals</p>
                <h2 id="revCount" class="text-4xl font-bold mt-2 text-rose-600">--</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="stat-card h-[350px]">
                <canvas id="chartInv"></canvas>
            </div>
            <div class="stat-card h-[350px]">
                <canvas id="chartStatus"></canvas>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzqusEJ8CH984F00ftQNPTLk_RpvA9Dottkq_L7NzW6aKPin4aSDL5bldfnvK6P00M-/exec";
        let charts = {};

        async function init() {
            const status = document.getElementById('syncStatus');
            try {
                const response = await fetch(API_URL, { redirect: 'follow' });
                const data = await response.json();
                
                if (data.text) {
                    processData(data.text);
                    status.innerText = "● LIVE: DATA SYNCED";
                    status.className = "px-4 py-2 rounded-full bg-emerald-100 text-emerald-600 font-bold text-xs uppercase tracking-widest";
                }
            } catch (err) {
                status.innerText = "OFFLINE / SYNC FAILED";
                console.error(err);
            }
        }

        function processData(text) {
            const lines = text.split('\n');
            const records = [];
            const names = ["Yousef", "Hayam", "Samy", "Mohamed"];

            lines.forEach(line => {
                const asin = line.match(/B0[A-Z0-9]{8}/i);
                if (asin) {
                    records.push({
                        inv: names.find(n => line.includes(n)) || "Other",
                        status: /Done|Resolved/i.test(line) ? "Done" : "WIP",
                        rev: /Yes|Rev/i.test(line)
                    });
                }
            });

            updateUI(records);
        }

        function updateUI(data) {
            const done = data.filter(d => d.status === "Done").length;
            document.getElementById('totalCount').innerText = data.length;
            document.getElementById('doneCount').innerText = done;
            document.getElementById('wipCount').innerText = data.length - done;
            document.getElementById('revCount').innerText = data.filter(d => d.rev).length;
            renderCharts(data);
        }

        function renderCharts(data) {
            const invCounts = {};
            data.forEach(d => invCounts[d.inv] = (invCounts[d.inv] || 0) + 1);

            if(charts.inv) charts.inv.destroy();
            charts.inv = new Chart(document.getElementById('chartInv'), {
                type: 'bar',
                data: {
                    labels: Object.keys(invCounts),
                    datasets: [{ label: 'Workload', data: Object.values(invCounts), backgroundColor: '#6366f1', borderRadius: 6 }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            const done = data.filter(d => d.status === "Done").length;
            if(charts.status) charts.status.destroy();
            charts.status = new Chart(document.getElementById('chartStatus'), {
                type: 'doughnut',
                data: {
                    labels: ['Done', 'WIP'],
                    datasets: [{ data: [done, data.length - done], backgroundColor: ['#10b981', '#f59e0b'] }]
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: '70%' }
            });
        }

        init();
        setInterval(init, 60000); // تحديث كل دقيقة
    </script>
</body>
</html>
