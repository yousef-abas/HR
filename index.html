<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quip performance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #020617; color: white; min-height: 100vh; }
        .investigator-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            transition: all 0.3s ease;
        }
        .investigator-card:hover {
            transform: translateY(-8px);
            border-color: #3b82f6;
            background: rgba(30, 41, 59, 0.7);
        }
        .progress-bar { transition: width 1.5s ease-in-out; }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="max-w-6xl mx-auto mb-16 flex flex-col md:flex-row justify-between items-center gap-6">
        <div class="text-center md:text-left">
            <h1 class="text-5xl font-black tracking-tighter">TEAM <span class="text-blue-500">STATS</span></h1>
            <p class="text-slate-500 font-bold mt-2 uppercase tracking-[0.2em] text-xs">Live Quip Tracking</p>
        </div>
        <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 px-8 py-3 rounded-2xl font-black transition-all shadow-lg shadow-blue-600/20">REFRESH DATA</button>
    </header>

    <div id="grid" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div class="col-span-full text-center py-20">
            <div class="inline-block w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-slate-500 font-bold uppercase tracking-widest">Reading from Cloud...</p>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzRnXehVfjdj4has9QPqt5a6ifxXH_UO35w5hxzy8HS0UiuleCV0XYVyJlGLdS68CfV/exec";

        async function init() {
            const grid = document.getElementById('grid');
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (!data || data.length === 0) {
                    grid.innerHTML = `<p class="col-span-full text-center text-amber-500">No data found in the sheet.</p>`;
                    return;
                }

                // تجميع الداتا لكل محقق
                const stats = {};
                data.forEach(item => {
                    const name = item.Investigator;
                    if (!stats[name]) stats[name] = { total: 0, done: 0 };
                    stats[name].total++;
                    if (String(item.Statues).toLowerCase().includes("done")) {
                        stats[name].done++;
                    }
                });

                grid.innerHTML = "";
                Object.keys(stats).forEach(name => {
                    const s = stats[name];
                    const percentage = ((s.done / s.total) * 100).toFixed(0);
                    
                    grid.innerHTML += `
                        <div class="investigator-card p-8">
                            <div class="flex justify-between items-start mb-6">
                                <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center text-3xl shadow-lg shadow-blue-500/20">👤</div>
                                <div class="text-right">
                                    <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Done Rate</span>
                                    <p class="text-2xl font-black text-emerald-400">${percentage}%</p>
                                </div>
                            </div>
                            
                            <h2 class="text-2xl font-black mb-1 uppercase tracking-tight">${name}</h2>
                            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-8 italic">Investigation Team</p>

                            <div class="grid grid-cols-2 gap-4 mb-8">
                                <div class="bg-black/20 p-4 rounded-2xl border border-white/5">
                                    <span class="text-[10px] text-slate-500 block font-bold uppercase">Total</span>
                                    <span class="text-xl font-bold">${s.total}</span>
                                </div>
                                <div class="bg-emerald-500/10 p-4 rounded-2xl border border-emerald-500/20">
                                    <span class="text-[10px] text-emerald-500 block font-bold uppercase">Completed</span>
                                    <span class="text-xl font-bold text-emerald-500">${s.done}</span>
                                </div>
                            </div>

                            <div class="w-full bg-slate-800 h-2.5 rounded-full overflow-hidden">
                                <div class="progress-bar bg-gradient-to-r from-blue-600 to-emerald-400 h-full rounded-full" style="width: ${percentage}%"></div>
                            </div>
                        </div>
                    `;
                });

            } catch (error) {
                grid.innerHTML = `<p class="col-span-full text-center text-red-500">Connection Error. Please try again later.</p>`;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
