<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Mode | Quip Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #020617; color: white; }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="p-6">

    <header class="max-w-7xl mx-auto py-10">
        <h1 class="text-4xl font-black">SYSTEM <span class="text-blue-500">DIAGNOSTIC</span></h1>
        <p id="status-msg" class="text-yellow-500 mt-2 font-mono italic">Waiting for cloud response...</p>
    </header>

    <div id="cardsGrid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>

    <script>
        // الرابط بتاعك
        const API_URL = "https://script.google.com/macros/s/AKfycbyfjiUQOnDUiTBnZpUxWRNnmCs-4OnzXhpuv6ePfgHSltMODXRJ9B5QyV71j7wJzSV8/exec";

        async function init() {
            const status = document.getElementById('status-msg');
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (data.length === 0) {
                    status.innerText = "Connected! But the Sheet is EMPTY.";
                    return;
                }

                status.innerText = `Success! Found ${data.length} rows. Analyzing columns...`;
                
                // هنطبع في الـ Console أسماء الأعمدة اللي السكريبت لقاها فعلياً
                console.log("Columns found in your sheet:", Object.keys(data[0]));
                
                renderUI(data);
            } catch (e) {
                status.innerText = "CONNECTION ERROR: Check Deployment Permissions (Must be 'Anyone').";
                console.error(e);
            }
        }

        function renderUI(rawData) {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = "";

            const users = {};
            
            rawData.forEach(item => {
                // محاولة تخمين اسم العمود (بيدور على أي كلمة قريبة)
                const name = item.investigator || item.investigatorname || item.الاسم || item.المحقق || item.name || "Unknown";
                
                if (!users[name]) users[name] = { total: 0 };
                users[name].total++;
            });

            Object.keys(users).forEach(name => {
                grid.innerHTML += `
                    <div class="glass-card p-8 rounded-[2rem]">
                        <div class="flex items-center gap-4 mb-4">
                            <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center text-2xl">👤</div>
                            <h3 class="text-xl font-bold">${name}</h3>
                        </div>
                        <p class="text-slate-400">Total Cases: <span class="text-white font-bold">${users[name].total}</span></p>
                    </div>
                `;
            });
        }

        window.onload = init;
    </script>
</body>
</html>
