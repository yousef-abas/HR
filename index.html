<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investigator Dashboard | WK_2:5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Tajawal', sans-serif; }
        .card-glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            transition: all 0.3s ease;
        }
        .card-glass:hover { transform: translateY(-5px); border-color: #3b82f6; }
        .progress-bar { height: 8px; background: #1e293b; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); transition: width 1s ease; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-6xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-black mb-2 text-white italic">INVESTIGATOR <span class="text-blue-500">PERFORMANCE</span></h1>
            <p class="text-slate-400 text-sm tracking-widest uppercase italic">LIVE TRACKING • WK_2:5</p>
            <div id="loader" class="mt-10">
                <div class="inline-block w-8 h-8 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div>
                <p class="text-xs text-slate-500 mt-2">جاري استلام وتحليل البيانات...</p>
            </div>
        </header>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        // رابط الـ API الجديد بتاعك
        const API_URL = "https://script.google.com/macros/s/AKfycbx0gCwKzLfXiUdYzC_kT9LAeSGugwgS4JsRvVdl4YgVk4g8Azj3wpj-Nwqjp1pbEUnP/exec";

        async function init() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                
                // تعديل ذكي: لو الداتا جوه result.data خدها، لو هي result علطول خدها
                const rows = result.data ? result.data : result; 

                if (!Array.isArray(rows) || rows.length === 0) {
                    document.getElementById('loader').innerHTML = `<p class="text-amber-400 font-bold">⚠️ تم الاتصال ولكن لم يتم العثور على صفوف بيانات.</p>`;
                    return;
                }

                const stats = {};

                rows.forEach((row, index) => {
                    // تخطي أول صفين (العناوين)
                    if (index < 2) return;

                    // بناءً على ترتيبك: العمود I (إندكس 8) هو الاسم، العمود J (إندكس 9) هو الحالة
                    const name = row[8] ? row[8].toString().trim() : "";
                    const status = row[9] ? row[9].toString().trim().toLowerCase() : "";

                    // التأكد إن الصف فيه اسم محقق حقيقي
                    if (!name || name === "" || name.toLowerCase() === "investigator") return;

                    if (!stats[name]) {
                        stats[name] = { total: 0, done: 0, pending: 0 };
                    }

                    stats[name].total++;

                    const isDone = status.includes("done") || 
                                   status.includes("defect") || 
                                   status.includes("wis") || 
                                   status.includes("no defect");

                    if (isDone) {
                        stats[name].done++;
                    } else {
                        stats[name].pending++;
                    }
                });

                if (Object.keys(stats).length === 0) {
                    document.getElementById('loader').innerHTML = `<p class="text-amber-400">ملقتش أسماء محققين في العمود رقم 9</p>`;
                } else {
                    render(stats);
                    document.getElementById('loader').style.display = 'none';
                }

            } catch (err) {
                console.error("Fetch Error:", err);
                document.getElementById('loader').innerHTML = `<p class="text-red-400">❌ فشل في الاتصال بالبيانات</p><p class="text-[10px] text-slate-600">${err.message}</p>`;
            }
        }

        function render(stats) {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";

            Object.keys(stats).sort().forEach(name => {
                const p = stats[name];
                const percent = Math.round((p.done / p.total) * 100) || 0;

                grid.innerHTML += `
                    <div class="card-glass p-6 border-l-4 ${percent >= 100 ? 'border-l-emerald-500' : 'border-l-blue-500'}">
                        <h2 class="text-xl font-bold text-white mb-4 truncate italic tracking-tighter">${name}</h2>
                        <div class="flex justify-between mb-4">
                            <div class="text-center">
                                <p class="text-[10px] text-slate-500 uppercase font-bold">Total</p>
                                <p class="text-lg font-black">${p.total}</p>
                            </div>
                            <div class="text-center">
                                <p class="text-[10px] text-emerald-500 uppercase font-bold">Done</p>
                                <p class="text-lg font-black text-emerald-400">${p.done}</p>
                            </div>
                            <div class="text-center">
                                <p class="text-[10px] text-amber-500 uppercase font-bold">Pending</p>
                                <p class="text-lg font-black text-amber-400">${p.pending}</p>
                            </div>
                        </div>
                        <div class="mt-4">
                            <div class="flex justify-between text-[10px] mb-1 font-bold">
                                <span class="text-slate-400 uppercase tracking-widest">Progress</span>
                                <span class="text-blue-400">${percent}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${percent}%"></div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        init();
    </script>
</body>
</html>
