<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Investigator Hub | Youssef Abbas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #020617; color: white; }
        .card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #3b82f6; }
    </style>
</head>
<body class="p-8">

    <header class="max-w-6xl mx-auto mb-12 flex justify-between items-center">
        <h1 class="text-4xl font-black">TEAM <span class="text-blue-500">CARDS</span></h1>
        <button onclick="location.reload()" class="bg-blue-600 px-6 py-2 rounded-xl font-bold">Sync Data</button>
    </header>

    <div id="grid" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="col-span-full text-center py-20 text-slate-500 animate-pulse">Scanning Weeks...</div>
    </div>

    <script>
        // ضع رابط الـ EXEC الجديد هنا
        const API_URL = "ضع_الرابط_الجديد_هنا";

        async function load() {
            const grid = document.getElementById('grid');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                if (data.length === 0) { grid.innerHTML = "No data found in WK sheets."; return; }

                const users = {};
                data.forEach(item => {
                    const name = item.Investigator || "Unknown";
                    if (!users[name]) users[name] = { total: 0, weeks: {} };
                    users[name].total++;
                    
                    const wk = item.SourceSheet || "Other";
                    users[name].weeks[wk] = (users[name].weeks[wk] || 0) + 1;
                });

                grid.innerHTML = "";
                Object.keys(users).forEach(name => {
                    const user = users[name];
                    let weeksHtml = Object.keys(user.weeks).map(w => 
                        `<div class="flex justify-between text-xs border-b border-white/5 py-1">
                            <span class="text-slate-400">${w}</span>
                            <span class="font-bold text-blue-400">${user.weeks[w]}</span>
                         </div>`
                    ).join('');

                    grid.innerHTML += `
                        <div class="card p-8">
                            <div class="w-12 h-12 bg-blue-600 rounded-xl mb-4 flex items-center justify-center text-2xl">👤</div>
                            <h3 class="text-xl font-bold mb-4">${name}</h3>
                            <div class="space-y-1 mb-6">${weeksHtml}</div>
                            <div class="pt-4 border-t border-white/10 flex justify-between">
                                <span class="text-xs text-slate-500 uppercase font-bold">Total Cases</span>
                                <span class="text-xl font-black text-emerald-400">${user.total}</span>
                            </div>
                        </div>
                    `;
                });
            } catch (e) { grid.innerHTML = "Error loading data."; }
        }
        load();
    </script>
</body>
</html>
