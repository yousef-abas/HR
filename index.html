<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحليل أداء المحققين - التفصيلي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: 'Tajawal', sans-serif; padding: 30px; }
        .main-card { background: #1e293b; border-radius: 20px; border: 1px solid #334155; padding: 25px; margin-bottom: 30px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .stat-box { background: #0f172a; border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #334155; }
        .badge-done { background: #065f46; color: #34d399; padding: 2px 10px; border-radius: 10px; font-size: 12px; }
        .badge-pending { background: #78350f; color: #fbbf24; padding: 2px 10px; border-radius: 10px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-black text-white mb-2">التقرير التحليلي الشامل للمحققين</h1>
            <p class="text-blue-400 font-bold uppercase tracking-widest text-sm">Investigator Detailed Performance Tracking</p>
        </header>

        <div id="results-container" class="space-y-8">
            <div class="text-center py-10">جاري سحب البيانات وتحليلها...</div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwZhr5GqkTH32_xaFgjjqpWmPQc2MHHcJqyg9J2U7_X5SKDcgmG21Q0rUlp6qS5zxjG/exec";

        async function loadAnalysis() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                const report = {};

                // 1. معالجة البيانات وتحليلها
                data.forEach((row, index) => {
                    if (index === 0 || !row[8]) return; // تخطي الهيدر والصفوف الفاضية

                    const name = row[8].trim();
                    const week = row[1] ? "أسبوع " + row[1] : "غير محدد";
                    const status = row[9] ? row[9].trim() : "Pending";

                    if (!report[name]) {
                        report[name] = { total: 0, done: 0, pending: 0, weeks: {}, closures: {} };
                    }

                    report[name].total++;
                    const isDone = status.toLowerCase().includes("done") || status.toLowerCase().includes("defect") || status.toLowerCase().includes("wis");

                    if (isDone) {
                        report[name].done++;
                        report[name].closures[status] = (report[name].closures[status] || 0) + 1;
                    } else {
                        report[name].pending++;
                    }

                    // تحليل الأسبوع
                    if (!report[name].weeks[week]) report[name].weeks[week] = { total: 0, done: 0 };
                    report[name].weeks[week].total++;
                    if (isDone) report[name].weeks[week].done++;
                });

                // 2. عرض النتائج في الصفحة
                const container = document.getElementById('results-container');
                container.innerHTML = "";

                Object.keys(report).forEach(name => {
                    const user = report[name];
                    
                    let closureLines = "";
                    Object.keys(user.closures).forEach(c => {
                        closureLines += `<div class="flex justify-between border-b border-white/5 py-2"><span>${c}</span><span class="font-bold text-blue-400">${user.closures[c]}</span></div>`;
                    });

                    let weekLines = "";
                    Object.keys(user.weeks).forEach(w => {
                        weekLines += `
                            <div class="bg-[#0f172a] p-3 rounded-lg flex justify-between items-center border border-white/5">
                                <span class="font-bold">${w}</span>
                                <span class="text-sm">إجمالي: ${user.weeks[w].total} | منجز: <span class="text-emerald-400">${user.weeks[w].done}</span></span>
                            </div>`;
                    });

                    container.innerHTML += `
                        <div class="main-card">
                            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b border-slate-700 pb-4">
                                <h2 class="text-3xl font-black text-white">${name}</h2>
                                <div class="text-sm font-bold text-slate-400 mt-2 md:mt-0">إجمالي التيكتات: <span class="text-white text-xl">${user.total}</span></div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                                <div class="stat-box border-emerald-500/30">
                                    <span class="block text-emerald-400 text-sm font-bold mb-1">تم إنجازه (Done)</span>
                                    <span class="text-3xl font-black text-emerald-400">${user.done}</span>
                                </div>
                                <div class="stat-box border-amber-500/30">
                                    <span class="block text-amber-400 text-sm font-bold mb-1">قيد العمل (Remaining)</span>
                                    <span class="text-3xl font-black text-amber-400">${user.pending}</span>
                                </div>
                                <div class="stat-box border-blue-500/30">
                                    <span class="block text-blue-400 text-sm font-bold mb-1">نسبة الإنجاز</span>
                                    <span class="text-3xl font-black text-blue-400">${Math.round((user.done/user.total)*100)}%</span>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div>
                                    <h3 class="text-lg font-bold mb-4 text-slate-400 border-r-4 border-blue-500 pr-3 italic">تفاصيل أنواع القفلة</h3>
                                    <div class="bg-black/20 p-4 rounded-xl space-y-1">${closureLines || "لا يوجد بيانات"}</div>
                                </div>
                                <div>
                                    <h3 class="text-lg font-bold mb-4 text-slate-400 border-r-4 border-emerald-500 pr-3 italic">الأداء الأسبوعي</h3>
                                    <div class="space-y-2">${weekLines}</div>
                                </div>
                            </div>
                        </div>`;
                });

            } catch (e) {
                console.error(e);
                document.getElementById('results-container').innerHTML = "حدث خطأ في عرض البيانات.";
            }
        }

        loadAnalysis();
    </script>
</body>
</html>
